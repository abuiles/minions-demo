<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dummy Snake</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1018;
        --card: #161b27;
        --accent: #66f6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: radial-gradient(circle at top, #11162b, #05070f 60%);
        color: #e1e7ff;
      }

      #game-panel {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 24px;
        width: min(420px, 90vw);
        text-align: center;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.45);
      }

      canvas {
        width: 100%;
        max-width: 360px;
        height: auto;
        border-radius: 12px;
        background: #050914;
        border: 2px solid rgba(255, 255, 255, 0.12);
      }

      #status {
        margin: 16px 0 4px;
        font-size: 1rem;
      }

      #hint {
        font-size: 0.85rem;
        color: #91a4ff;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="game-panel">
      <h1>Dummy Snake</h1>
      <canvas id="game" width="360" height="360" aria-label="Simple snake game"></canvas>
      <p id="status">Score: 0 · Use &#8593;&#8595;&#8592;&#8594; or WASD</p>
      <p id="hint">The snake wraps around the edges. Eat the blue dot to grow.</p>
    </div>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const tileSize = 20;
      const cols = canvas.width / tileSize;
      const rows = canvas.height / tileSize;
      const status = document.getElementById('status');

      let snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
      let direction = { x: 1, y: 0 };
      let nextDirection = { ...direction };
      let apple = spawnApple();
      let score = 0;

      function spawnApple() {
        return {
          x: Math.floor(Math.random() * cols),
          y: Math.floor(Math.random() * rows),
        };
      }

      function draw() {
        ctx.fillStyle = '#050914';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#66f6ff';
        ctx.fillRect(apple.x * tileSize + 2, apple.y * tileSize + 2, tileSize - 4, tileSize - 4);

        ctx.fillStyle = '#94ffa5';
        snake.forEach((segment) => {
          ctx.fillRect(segment.x * tileSize + 1, segment.y * tileSize + 1, tileSize - 2, tileSize - 2);
        });
      }

      function wrap(position, max) {
        if (position < 0) return max - 1;
        if (position >= max) return 0;
        return position;
      }

      function tick() {
        direction = nextDirection;
        const newHead = {
          x: wrap(snake[0].x + direction.x, cols),
          y: wrap(snake[0].y + direction.y, rows),
        };

        const collided = snake.some((segment) => segment.x === newHead.x && segment.y === newHead.y);
        if (collided) {
          score = 0;
          snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
          direction = { x: 1, y: 0 };
          nextDirection = { ...direction };
          apple = spawnApple();
          status.textContent = 'Ooops! Self collision. Score reset to 0.';
          return;
        }

        snake.unshift(newHead);
        if (newHead.x === apple.x && newHead.y === apple.y) {
          score += 1;
          apple = spawnApple();
        } else {
          snake.pop();
        }

        status.textContent = `Score: ${score} · Use ↑↓←→ or WASD`;
        draw();
      }

      document.addEventListener('keydown', (event) => {
        const key = event.key;
        const mapping = {
          ArrowUp: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 },
          w: { x: 0, y: -1 },
          s: { x: 0, y: 1 },
          a: { x: -1, y: 0 },
          d: { x: 1, y: 0 },
        };

        const next = mapping[key];
        if (!next) return;

        if (next.x === -direction.x && next.y === -direction.y) {
          return;
        }

        nextDirection = next;
      });

      draw();
      setInterval(tick, 120);
    </script>
  </body>
</html>
