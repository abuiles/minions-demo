<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minion Mayhem</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0312;
        --panel: #1b0b2b;
        --accent: #ff9a56;
        --secondary: #62dacf;
        --glass: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
        background: radial-gradient(circle at 20% -10%, #4a1f4b, transparent 40%),
          radial-gradient(circle at 80% 0%, #1b6d87, transparent 45%),
          linear-gradient(180deg, #0a0312 10%, #05070c 70%, #010105 100%);
        color: #f4f9ff;
        padding: 20px;
      }

      main {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #game-panel {
        width: min(480px, 95vw);
        padding: 32px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(10, 6, 20, 0.8));
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 20px 70px rgba(6, 3, 15, 0.85);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.2rem, 4vw, 2.8rem);
        letter-spacing: 2px;
      }

      p {
        margin: 8px 0;
      }

      canvas {
        width: 100%;
        max-width: 360px;
        height: auto;
        margin: 16px auto;
        border-radius: 16px;
        background: radial-gradient(circle at 20% 10%, rgba(255, 154, 86, 0.18), rgba(0, 0, 0, 0.8)),
          radial-gradient(circle at 80% 30%, rgba(98, 218, 207, 0.18), rgba(2, 6, 16, 0.9));
        border: 3px solid var(--glass);
        display: block;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 999px;
        padding: 6px 12px;
        background: rgba(98, 218, 207, 0.15);
        color: var(--secondary);
        border: 1px solid rgba(98, 218, 207, 0.4);
        margin-bottom: 14px;
      }

      #status {
        font-size: 1rem;
        margin: 10px 0 6px;
      }

      #hint {
        font-size: 0.9rem;
        color: #b7c0ff;
        margin-bottom: 0;
      }

      #flavor {
        font-size: 0.85rem;
        color: #a4a9b7;
      }

      .footer-note {
        margin-top: 16px;
        font-size: 0.75rem;
        color: rgba(234, 243, 255, 0.7);
        text-align: center;
        letter-spacing: 0.8px;
      }

      .mode-controls {
        margin: 12px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mode-controls label {
        font-size: 0.9rem;
        color: #cad3ff;
      }

      .mode-controls select {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #10061e;
        color: #f4f9ff;
        border-radius: 10px;
        padding: 6px 10px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="game-panel">
        <span class="status-badge" aria-live="polite" aria-label="Demo status badge">status · live</span>
        <h1>Minion Mayhem</h1>
        <p id="flavor">Guide the little Minion through the lab, gobble bananas, and dodge yourself!</p>
        <div class="mode-controls">
          <label for="game-mode">Game mode</label>
          <select id="game-mode">
            <option value="normal">Normal</option>
            <option value="progressive">Progressive speed</option>
          </select>
        </div>
        <canvas id="game" width="360" height="360" aria-label="Minion-themed snake game"></canvas>
        <p id="status" role="status">Score: 0 · Use ↑↓←→ or WASD to steer</p>
        <p id="hint">Keyboard controls: arrow keys or WASD steer the Minions.</p>
      </div>
    </main>
    <footer class="footer-note" aria-label="Demo origin note">The demo is generated by AgentBoard.</footer>

    <script>
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const tileSize = 20;
      const cols = canvas.width / tileSize;
      const rows = canvas.height / tileSize;
      const status = document.getElementById('status');
      const gameModeSelect = document.getElementById('game-mode');
      const query = new URLSearchParams(location.search);

      const colors = {
        yellow: '#f4d03f',
        blue: '#1b61c7',
        gray: '#3b3b3b',
        lens: '#fdfdfd',
        pupil: '#2b2b2b',
        banana: '#f7cf4b',
        explosive: '#ff4f4f',
        fuse: '#ffd166',
      };

      let snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
      let direction = { x: 1, y: 0 };
      let nextDirection = { ...direction };
      let score = 0;
      let minionsCollected = 0;
      let randomState = 0;
      let gameMode = 'normal';
      let gameLoop = null;
      const defaultGameMode = 'normal';
      const gameModeDefinitions = {
        normal: {
          label: 'Normal',
          baseTickMs: 140,
        },
        progressive: {
          label: 'Progressive speed',
          baseTickMs: 140,
          minTickMs: 60,
          tickStepMs: 8,
          tickStepEvery: 3,
          maxSteps: 10,
        },
      };
      const itemTypes = { banana: 'banana', explosive: 'explosive' };
      const explosiveSpawnChance = 0.14;
      const supportedSeedModes = new Set([
        'banana',
        'explosive',
        'random',
        'normal',
      ]);
      const supportedGameModes = new Set([
        'normal',
        'progressive',
      ]);
      let queuedItemType = null;
      let item;

      let rand = Math.random;

      function setSeed(seed) {
        const parsedSeed = Number(seed);
        if (!Number.isFinite(parsedSeed)) {
          return randomState;
        }

        randomState = (parsedSeed >>> 0) || 1;
        rand = () => {
          randomState = (1664525 * randomState + 1013904223) >>> 0;
          return randomState / 0x100000000;
        };
        return randomState;
      }

      function randomInt(max) {
        return Math.floor(rand() * max);
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getProgressiveTickMs(points) {
        const profile = getModeDefinition('progressive');
        const baseTickMs = Math.max(profile.baseTickMs, profile.minTickMs);
        const minTickMs = Math.max(profile.minTickMs, 40);
        const stepMs = Math.max(1, profile.tickStepMs);
        const stepEvery = Math.max(1, profile.tickStepEvery);
        const maxSteps = Math.max(0, profile.maxSteps);
        const safePoints = Math.max(0, Number(points) || 0);
        const speedSteps = Math.min(maxSteps, Math.floor(safePoints / stepEvery));
        const tickMs = baseTickMs - speedSteps * stepMs;

        return clamp(tickMs, minTickMs, baseTickMs);
      }

      function setNextItemType(nextType) {
        const normalized = typeof nextType === 'string' ? nextType.toLowerCase() : '';
        if (!supportedSeedModes.has(normalized)) return queuedItemType;

        queuedItemType = normalized === 'random' || normalized === 'normal' ? null : normalized;
        return queuedItemType;
      }

      function spawnItem() {
        const forcedType = queuedItemType;
        queuedItemType = null;
        const type = forcedType
          ? forcedType
          : rand() < explosiveSpawnChance
            ? itemTypes.explosive
            : itemTypes.banana;

        return {
          x: randomInt(cols),
          y: randomInt(rows),
          type,
        };
      }

      function forceDeterministicSeedFromQuery() {
        const seedParam = query.get('seed');
        if (seedParam === null) return;
        const seed = Number(seedParam);
        if (!Number.isFinite(seed)) return;
        setSeed(seed);
      }

      function forceItemTypeFromQuery() {
        const nextItemType = query.get('nextItemType') || query.get('itemType');
        if (nextItemType === null) return;
        setNextItemType(nextItemType);
      }

      function parseGameMode(mode) {
        const normalized = typeof mode === 'string' ? mode.toLowerCase() : '';
        return supportedGameModes.has(normalized) ? normalized : defaultGameMode;
      }

      function getModeDefinition(mode) {
        return gameModeDefinitions[parseGameMode(mode)] || gameModeDefinitions[defaultGameMode];
      }

      function getTickInterval() {
        if (gameMode === 'progressive') {
          return getProgressiveTickMs(minionsCollected);
        }

        return getModeDefinition(gameMode).baseTickMs;
      }

      function clearGameLoop() {
        if (gameLoop !== null) {
          clearTimeout(gameLoop);
          gameLoop = null;
        }
      }

      function scheduleGameLoop() {
        gameLoop = setTimeout(() => {
          tick();
          scheduleGameLoop();
        }, getTickInterval());
      }

      function setGameMode(nextMode, shouldRenderHint = true) {
        gameMode = parseGameMode(nextMode);

        if (gameModeSelect) {
          gameModeSelect.value = gameMode;
        }

        clearGameLoop();
        scheduleGameLoop();

        if (shouldRenderHint) {
          const profile = getModeDefinition(gameMode);
          const normalizedMode = profile.label || gameMode;
          status.textContent = `Mode: ${normalizedMode} · Minion crew: ${score} · steer with ↑↓←→ or WASD`;
        }
      }

      function drawExplosive(target) {
        const px = target.x * tileSize + tileSize * 0.15;
        const py = target.y * tileSize + tileSize * 0.22;

        ctx.fillStyle = colors.explosive;
        ctx.beginPath();
        ctx.arc(px + tileSize * 0.5, py + tileSize * 0.45, tileSize * 0.33, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = colors.fuse;
        ctx.fillRect(px + tileSize * 0.47, py + tileSize * 0.02, tileSize * 0.06, tileSize * 0.35);
        ctx.fillStyle = colors.pupil;
        ctx.fillRect(px + tileSize * 0.34, py + tileSize * 0.15, tileSize * 0.22, tileSize * 0.08);
        ctx.fillRect(px + tileSize * 0.44, py + tileSize * 0.4, tileSize * 0.22, tileSize * 0.08);
      }

      function drawBanana(target = item) {
        const px = target.x * tileSize + tileSize * 0.1;
        const py = target.y * tileSize + tileSize * 0.45;
        ctx.fillStyle = colors.banana;
        ctx.beginPath();
        ctx.ellipse(px + 12, py + 4, tileSize * 0.4, tileSize * 0.18, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = colors.gray;
        ctx.fillRect(px + 18, py + 4, 6, 2);
        ctx.fillStyle = colors.banana;
        ctx.fillRect(px + 22, py + 4, 2, 2);
      }

      function drawItem() {
        if (item.type === itemTypes.explosive) {
          drawExplosive(item);
          return;
        }

        drawBanana(item);
      }

      function drawSegment(segment, isHead) {
        const px = segment.x * tileSize + 2;
        const py = segment.y * tileSize + 2;
        const size = tileSize - 4;

        ctx.fillStyle = colors.yellow;
        ctx.fillRect(px, py, size, size);
        ctx.fillStyle = colors.blue;
        ctx.fillRect(px, py + size * 0.55, size, size * 0.45);

        if (isHead) {
          const strapHeight = size * 0.18;
          ctx.fillStyle = colors.gray;
          ctx.fillRect(px, py + size * 0.2, size, strapHeight);

          const lensRadius = size * 0.25;
          const spacing = size * 0.1;
          const lensY = py + size * 0.38;
          const leftX = px + size * 0.28;
          const rightX = px + size * 0.72;

          ctx.fillStyle = colors.lens;
          ctx.beginPath();
          ctx.arc(leftX, lensY, lensRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(rightX, lensY, lensRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = colors.pupil;
          ctx.beginPath();
          ctx.arc(leftX, lensY, lensRadius * 0.55, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(rightX, lensY, lensRadius * 0.55, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function draw() {
        ctx.fillStyle = '#050914';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawItem();
        snake.forEach((segment, index) => drawSegment(segment, index === 0));
      }

      function wrap(value, limit) {
        if (value < 0) return limit - 1;
        if (value >= limit) return 0;
        return value;
      }

      function tick() {
        direction = nextDirection;
        const newHead = {
          x: wrap(snake[0].x + direction.x, cols),
          y: wrap(snake[0].y + direction.y, rows),
        };

        const collided = snake.some((segment) => segment.x === newHead.x && segment.y === newHead.y);
        if (collided) {
          score = 0;
          minionsCollected = 0;
          snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
          direction = { x: 1, y: 0 };
          nextDirection = { ...direction };
          item = spawnItem();
          status.textContent = 'Chill—Minion pile-up! Score reset.';
          draw();
          return;
        }

        snake.unshift(newHead);
        let ateItem = false;
        let exploded = false;
        if (newHead.x === item.x && newHead.y === item.y) {
          ateItem = true;
          if (item.type === itemTypes.explosive) {
            minionsCollected = 0;
            snake = [snake[0]];
            status.textContent = 'BOOM! Explosive avocado exploded; only one minion survives.';
            exploded = true;
          } else {
            score += 1;
            minionsCollected += 1;
          }
          item = spawnItem();
        } else {
          snake.pop();
        }

        if (exploded) {
          status.textContent = 'BOOM! Explosive avocado exploded; only one minion survives.';
        } else if (ateItem) {
          status.textContent = `Minion crew: ${score} · steer with ↑↓←→ or WASD`;
        } else {
          status.textContent = `Minion crew: ${score} · steer with ↑↓←→ or WASD`;
        }
        draw();
      }

      document.addEventListener('keydown', (event) => {
        const key = event.key;
        const mapping = {
          ArrowUp: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 },
          w: { x: 0, y: -1 },
          s: { x: 0, y: 1 },
          a: { x: -1, y: 0 },
          d: { x: 1, y: 0 },
        };

        const next = mapping[key];
        if (!next) return;

        if (next.x === -direction.x && next.y === -direction.y) {
          return;
        }

        nextDirection = next;
      });

      gameModeSelect.addEventListener('change', (event) => {
        setGameMode(event.target.value, false);
      });

      forceDeterministicSeedFromQuery();
      forceItemTypeFromQuery();
      item = spawnItem();
      window.__minionsDemo = {
        setSeed,
        setNextItemType,
        setGameMode,
        getState: () => ({
          seed: randomState,
          snake: [...snake],
          mode: gameMode,
          minionsCollected,
          tickInterval: getTickInterval(),
          item,
          score,
        }),
        tick,
      };
      draw();
      setGameMode(query.get('mode') || 'normal', false);
    </script>
  </body>
</html>
